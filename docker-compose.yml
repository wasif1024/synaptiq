services:
  mysql:
    image: mysql:8
    container_name: synaptiq-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: synaptiq_64cc5b17
    ports:
      - "3306:3306"
    networks:
      - appnet
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 3s
      retries: 10

  frontend:
    build: ./frontend
    container_name: synaptiq-frontend
    ports:
      - "4000:4000"
    environment:
      - NEXT_PUBLIC_API_URL=http://backend:8080
    networks:
      - appnet
    depends_on:
      - backend

  backend:
    build: ./backend
    container_name: synaptiq-backend
    ports:
      - "8080:8080"
    environment:
      - PORT=8080
      - MYSQL_HOST=mysql
      - MYSQL_PORT=3306
      - MYSQL_USER=root
      - MYSQL_PASSWORD=root
      - MYSQL_DB=synaptiq_64cc5b17
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - CORS_ALLOWED_ORIGINS=http://localhost:4000,http://frontend:4000
    networks:
      - appnet
    depends_on:
      mysql:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"

networks:
  appnet:
    driver: bridge